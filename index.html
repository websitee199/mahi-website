<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahesh  babu K | 3D Portfolio</title>

<link rel="stylesheet" href="style.css">

<!-- Three.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<!-- 3D Background -->
<canvas id="bg"></canvas>

<!-- Glass Container -->
<div class="glass">
    <h1>Welcome to My 3D World 🚀</h1>
    <p>I build Interactive 3D Cloud & Web Experiences.</p>
    <button onclick="openForm()">Contact Me</button>
</div>

<!-- Chatbot Icon with Logo -->
<div class="chat-icon" onclick="toggleChat()">
    <img src="https://github.com/websitee199/mahi-website/blob/main/bot.png" alt="Chatbot Logo">
</div>

<!-- Chatbot -->
<div class="chat-box" id="chatBox">
    <div class="chat-header">
        <img src="https://github.com/websitee199/mahi-website/blob/main/bot.png" class="chat-logo">
        Mahesh Assistant
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
