<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Work Force</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <!-- Logo -->
    <header>
      <h1>WORK FORCE</h1>
      <p class="tagline">
        Where your Imagination meets reality • Your work in our hands.. end2end Labour services
      </p>
    </header>

    <!-- Clickable Icon Grid -->
    <section class="icon-grid">

      <div class="icon-card"
           data-text="FARMING SERVICES"
           onclick="location.href='farming.html'">
        <div class="icon">🌾🚜</div>
      </div>

      <div class="icon-card"
           data-text="CONSTRUCTION SERVICES"
           onclick="location.href='construction.html'">
        <div class="icon">👷‍♂️</div>
      </div>

      <div class="icon-card"
           data-text="DAILY WORKS"
           onclick="location.href='daily.html'">
        <div class="icon">💼⚒️</div>
      </div>

      <div class="icon-card"
           data-text="FEED BACK"
           onclick="location.href='feedback.html'">
        <div class="icon">📝</div>
      </div>

    </section>

    <!-- Dynamic Hover Text -->
    <div id="infoText">Hover an icon</div>

  </div>

  <script src="script.js"></script>

</body>
</html>
