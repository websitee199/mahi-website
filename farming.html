<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farming Services</title>

<style>
body{
  background:#0f2027;
  color:white;
  font-family:Segoe UI, sans-serif;
  text-align:center;
}

h1{ margin-top:30px; }

table{
  margin:40px auto;
  border-collapse:collapse;
  width:96%;
  max-width:1200px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:10px;
  overflow:hidden;
}

th, td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.15);
}

th{ background:rgba(255,255,255,0.15); }

tr:hover{ background:rgba(255,255,255,0.12); }

a{
  color:#00e5ff;
  text-decoration:none;
  font-weight:bold;
}

/* ⭐ Stars */

.stars span{
  font-size:22px;
  cursor:pointer;
  color:#777;
  transition:0.2s;
}

.stars span.active{ color:gold; }

/* 💬 Review box */

textarea{
  width:160px;
  height:45px;
  border-radius:6px;
  border:none;
  padding:5px;
  resize:none;
}

button{
  margin-top:4px;
  padding:4px 8px;
  border:none;
  border-radius:5px;
  background:#00e5ff;
  cursor:pointer;
}

.review-display{
  font-size:12px;
  margin-top:4px;
  color:#ddd;
}
</style>
</head>

<body>

<h1>🌾🚜 Farming Services</h1>

<table>

<tr>
  <th>No</th>
  <th>Name</th>
  <th>Equipment</th>
  <th>Phone</th>
  <th>Address</th>
  <th>Rating</th>
  <th>Review</th>
</tr>

<!-- ===== FUNCTION TO REUSE ROWS ===== -->

<script>
function createRow(no,name,equip,phone,address){
return `
<tr>
<td>${no}</td>
<td>${name}</td>
<td>${equip}</td>
<td><a href="tel:${phone}">${phone}</a></td>
<td>${address}</td>

<td>
<div class="stars">
<span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
</div>
</td>

<td>
<textarea placeholder="Write review..."></textarea>
<br>
<button onclick="saveReview(this)">Submit</button>
<div class="review-display"></div>
</td>

</tr>
`;
}
</script>

<tbody id="data"></tbody>

</table>

<script>

/* ==== INSERT 10 PEOPLE ==== */

document.getElementById("data").innerHTML =

createRow(1,"K MAHESH BABU","Tractor","1234567890","SANKRANTHIPALLI")+
createRow(2,"RAVI KUMAR","Harvester","9876543210","VENKATAGIRI")+
createRow(3,"SURESH REDDY","Mini Tractor","9123456780","KOVUR")+
createRow(4,"RAJU NAIDU","Plough Machine","9012345678","BUCHIREDDYPALEM")+
createRow(5,"VENKATESH","Seed Drill","9988776655","ALLUR")+
createRow(6,"MOHAN BABU","Rotavator","9090909090","INDUKURUPETA")+
createRow(7,"SRINIVAS","Water Tanker","9345678901","NELLORE RURAL")+
createRow(8,"PRASAD","Power Sprayer","9556677889","PODALAKUR")+
createRow(9,"NAGARAJU","Mini Tractor","9887766554","KALIGIRI")+
createRow(10,"RAHUL REDDY","Combine Harvester","9001122334","ATMAKUR");


/* ==== STAR RATING ==== */

document.querySelectorAll(".stars").forEach(box=>{
  const stars = box.querySelectorAll("span");

  stars.forEach((star,i)=>{
    star.onclick=()=>{
      stars.forEach((s,j)=> s.classList.toggle("active", j<=i));
    }
  });
});


/* ==== SAVE REVIEW ==== */

function saveReview(btn){
  const td = btn.parentElement;
  const text = td.querySelector("textarea").value;
  const display = td.querySelector(".review-display");

  if(text.trim() !== ""){
    display.textContent = "User Review: " + text;
  }
}

</script>

</body>
</html>
